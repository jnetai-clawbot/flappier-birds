name: Build Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: ''
jobs:
  build-release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin', cache: gradle}
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x gradlew
      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else echo "version=0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT; fi
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "Keystore restored from secret"
          else
            echo "No keystore secret found, generating temporary keystore"
            keytool -genkey -v \
              -keystore keystore.jks \
              -alias ciphervault \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass changeit -keypass changeit \
              -dname "CN=FlappierBirds, OU=Dev, O=JNet, L=Unknown, S=Unknown, C=GB"
          fi
      - name: Set version in build.gradle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          VERSION_CODE=$(echo "$VERSION" | tr -cd '0-9')
          if [[ -z "$VERSION_CODE" ]]; then VERSION_CODE="${{ github.run_number }}"; fi
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" app/build.gradle.kts
      - env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-changeit}"
          export KEY_ALIAS="${KEY_ALIAS:-ciphervault}"
          export KEY_PASSWORD="${KEY_PASSWORD:-changeit}"
          ./gradlew clean assembleRelease bundleRelease --stacktrace
      - name: Stage release files
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/release/app-release.apk "apk/Flappier-Birds-${{ steps.version.outputs.version }}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "apk/Flappier-Birds-${{ steps.version.outputs.version }}.aab"
      - uses: actions/upload-artifact@v4
        with:
          name: Flappier-Birds-Release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
      - uses: softprops/action-gh-release@v1
        with:
          name: "Flappier Birds v${{ steps.version.outputs.version }}"
          files: |
            apk/Flappier-Birds-${{ steps.version.outputs.version }}.apk
            apk/Flappier-Birds-${{ steps.version.outputs.version }}.aab
          tag_name: ${{ github.ref_name || format('v{0}', steps.version.outputs.version) }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
