name: Build Release APK on Push
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CHANGELOG.md'
      - '.gitignore'
      - 'PROMPT.md'
      - 'changes.txt'
      - 'apk/**'
jobs:
  build-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin', cache: gradle}
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x gradlew
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          else
            keytool -genkey -v \
              -keystore keystore.jks \
              -alias ciphervault \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass changeit -keypass changeit \
              -dname "CN=FlappierBirds, OU=Dev, O=JNet, L=Unknown, S=Unknown, C=GB"
          fi
      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-changeit}"
          export KEY_ALIAS="${KEY_ALIAS:-ciphervault}"
          export KEY_PASSWORD="${KEY_PASSWORD:-changeit}"
          ./gradlew assembleRelease --stacktrace
      - name: Verify and stage APK
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Release APK was not produced at $APK_PATH"
            ls -la app/build/outputs/apk/release/ || true
            exit 1
          fi
          mkdir -p apk
          cp "$APK_PATH" apk/Flappier-Birds.apk
          ls -lh apk/Flappier-Birds.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Flappier-Birds-APK
          path: apk/Flappier-Birds.apk
      - name: Commit APK to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apk/Flappier-Birds.apk
          if git diff --staged --quiet; then
            echo "APK unchanged, skipping commit"
          else
            git commit -m "ci: update release APK [skip ci]"
            git push
          fi
